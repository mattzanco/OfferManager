name: Deploy .NET WebApi to Azure Container Registry & AKS

on:
  push:
    branches:
      - dev
    paths:
      - 'OfferManager.WebApi/**'
      - 'OfferManager.Domain/**'
      - 'OfferManager.Storage/**'
      - '.github/workflows/deploy-webapi.yml'

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
  IMAGE_NAME: offermanager-webapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./OfferManager.WebApi/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Notify image pushed
        run: echo "Docker image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'offermanager-dev-rg'
          cluster-name: 'offermanager-dev-aks'
          admin: 'false'

      - name: Update deployment image
        run: |
          kubectl set image deployment/offermanager-webapi \
            offermanager-webapi=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n default || echo "Deployment may not exist yet"

      - name: Notify deployment
        run: echo "AKS deployment updated with new image"
