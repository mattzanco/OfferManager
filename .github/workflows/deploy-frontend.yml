name: Deploy React Frontend to Azure Static Web Apps

# Staging SWA (existing app) ← branch `dev`  |  Production SWA (new app) ← branch `main`
# GitHub secrets (repository → Settings → Secrets):
#   AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING    — deployment token for the *staging* Static Web App
#   AZURE_STATIC_WEB_APPS_API_TOKEN_PRODUCTION — deployment token for the *production* Static Web App
#   APIM_SUBSCRIPTION_KEY_STAGING              — APIM subscription key used by frontend builds

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build React app
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://offermanager-dev-apim.azure-api.net
          VITE_API_KEY: ${{ secrets.APIM_SUBSCRIPTION_KEY_STAGING }}

      - name: Remove App Service config files
        working-directory: ./frontend/dist
        run: |
          rm -f web.config
          rm -f .deployment

      - name: Deploy to staging Static Web App (dev)
        if: github.ref == 'refs/heads/dev'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          production_branch: dev
          app_location: 'frontend/dist'
          output_location: ''
          skip_app_build: true

      - name: Deploy to production Static Web App (main)
        if: github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PRODUCTION }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          production_branch: main
          app_location: 'frontend/dist'
          output_location: ''
          skip_app_build: true

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment Status: ${{ job.status }}"
