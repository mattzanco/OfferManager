name: Deploy React Frontend to Azure App Service

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build React app
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://offermanager-dev-backend.azurewebsites.net/api

      - name: Copy web.config to dist
        working-directory: ./frontend
        run: cp public/web.config dist/

      - name: Disable Oryx build
        uses: azure/appservice-settings@v1
        with:
          app-name: 'offermanager-dev-frontend'
          app-settings-json: '[{"name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false"}]'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_FRONTEND }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'offermanager-dev-frontend'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_FRONTEND }}
          package: './frontend/dist'

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment Status: ${{ job.status }}"
          echo "Frontend URL: https://offermanager-dev-frontend.azurewebsites.net"
