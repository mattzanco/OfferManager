name: Deploy React Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build React app
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://offermanager-dev-backend.azurewebsites.net/api

      - name: Remove App Service config files
        working-directory: ./frontend/dist
        run: |
          Remove-Item -Force web.config -ErrorAction SilentlyContinue
          Remove-Item -Force .deployment -ErrorAction SilentlyContinue

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend/dist'
          output_location: ''
          skip_app_build: true

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment Status: ${{ job.status }}"
